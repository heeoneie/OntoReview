services:
  - type: web
    name: ontoreview-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        value: "openai"
      - key: PYTHON_VERSION
        value: "3.11.9"
